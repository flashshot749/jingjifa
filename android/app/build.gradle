plugins {
    id 'com.android.application'
}

android {
    namespace 'com.jingjifa.quiz'
    compileSdk 34

    defaultConfig {
        applicationId "com.jingjifa.quiz"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt')
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
}
